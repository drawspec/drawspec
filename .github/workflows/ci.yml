name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: cog check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build

  perf-check:
    name: perf-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [check]
    env:
      DRAWSPEC_RUN_BENCH: "1"
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH

      # --- PR branch benchmarks ---
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: cp -r scripts /tmp/bench-scripts
      - name: Run benchmarks on PR branch
        run: |
          bun scripts/bench-run.ts ./packages/core/src/__bench__/compile.bench.ts --key pr > /tmp/bench-pr-core.json
          bun scripts/bench-run.ts ./packages/layout/src/__bench__/layout.bench.ts --key pr > /tmp/bench-pr-layout.json
          bun scripts/bench-merge.ts --key pr /tmp/bench-pr-core.json /tmp/bench-pr-layout.json -o /tmp/bench-pr.json

      # --- Main branch benchmarks ---
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run benchmarks on base branch
        run: |
          bun /tmp/bench-scripts/bench-run.ts ./packages/core/src/__bench__/compile.bench.ts --key base > /tmp/bench-base-core.json
          bun /tmp/bench-scripts/bench-run.ts ./packages/layout/src/__bench__/layout.bench.ts --key base > /tmp/bench-base-layout.json
          bun /tmp/bench-scripts/bench-merge.ts --key base /tmp/bench-base-core.json /tmp/bench-base-layout.json -o /tmp/bench-base.json

      # --- Compare ---
      - name: Compare PR vs base
        run: bun /tmp/bench-scripts/bench-compare.ts /tmp/bench-base.json /tmp/bench-pr.json --threshold 0.25
