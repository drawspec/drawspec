name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: cog check ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build

  perf-check:
    name: perf-check
    runs-on: ubuntu-latest
    # Only run on pull requests, not on push to main
    if: github.event_name == 'pull_request'
    needs: [check]
    env:
      DRAWSPEC_RUN_BENCH: "1"
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo "$HOME/.local/share/mise/shims" >> $GITHUB_PATH
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run benchmarks and compare against baseline
        run: |
          bun test --bench ./packages/core/src/__bench__/compile.bench.ts 2>&1 | node scripts/bench-compare.mjs
          bun test --bench ./packages/layout/src/__bench__/layout.bench.ts 2>&1 | node scripts/bench-compare.mjs
